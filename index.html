<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGA-ME | Encontre uma Igreja - 1 de Maio</title>
  <meta name="description" content="SIGA-ME - Movimento evangelístico. 1 de Maio. Encontre a igreja mais próxima de você.">
  <meta property="og:title" content="SIGA-ME - 1 de Maio">
  <meta property="og:description" content="Movimento evangelístico. Encontre a igreja mais próxima de você.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HERO -->
  <header id="hero">
    <div class="hero-content">
      <p class="hero-tag">Movimento Evangelístico</p>
      <h1 class="hero-title">
        <img src="assets/images/logo-siga-me.png" alt="SIGA-ME" class="hero-logo">
      </h1>
      <p class="hero-date">1 DE MAIO</p>
      <a href="#map-section" class="btn-cta">ENCONTRE UMA IGREJA</a>
    </div>
    <div class="hero-divider">
      <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C120,80 240,0 360,50 C480,90 600,10 720,45 C840,75 960,15 1080,55 C1200,85 1320,20 1440,40 L1440,80 L0,80 Z" fill="var(--color-bg-light)"/>
      </svg>
    </div>
  </header>

  <main>
    <!-- MAP -->
    <section id="map-section">
      <div class="container">
        <h2 class="section-title">Encontre uma Igreja</h2>
        <p class="section-subtitle">Clique em um marcador no mapa para ver os detalhes da igreja</p>
        <div id="map"></div>
      </div>
    </section>

    <!-- CHURCH LIST -->
    <section id="churches">
      <div class="container">
        <h2 class="section-title">Igrejas Participantes</h2>
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search" placeholder="Buscar por nome ou bairro..." autocomplete="off">
        </div>
        <div id="church-list"></div>
        <p id="no-results" class="no-results" hidden>Nenhuma igreja encontrada.</p>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer id="footer">
    <div class="container">
      <div class="footer-logos">
        <img src="assets/images/logo-move-4.png" alt="MOVE 4" class="footer-logo">
      </div>
      <p class="footer-text">SIGA-ME 2025 - Movimento Evangelístico</p>
      <p class="footer-credits">Feito por Luis Honorato</p>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
